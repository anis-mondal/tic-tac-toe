name: Build Offline Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install

      - name: Install Capacitor Packages
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web Application
        run: npm run build

      - name: Initialize Capacitor Config
        run: |
          echo '{"appId": "com.tictactoe.game", "appName": "Tic Tac Toe", "webDir": "dist", "bundledWebRuntime": false}' > capacitor.config.json

      - name: Add Android Platform
        run: npx cap add android

      - name: Capacitor Sync
        run: npx cap sync

      - name: Set up Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: TicTacToe-Offline-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
